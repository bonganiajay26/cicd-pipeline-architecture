apiVersion: v1
kind: Service
metadata:
  name: python-devops-app
  namespace: cicd
  labels:
    app: python-devops-app
    managed-by: jenkins
  annotations:
    description: "ClusterIP service exposing python-devops-app on port 80"
spec:
  type: ClusterIP
  selector:
    app: python-devops-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
  sessionAffinity: None

---
# HorizontalPodAutoscaler for the application
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: python-devops-app-hpa
  namespace: cicd
  labels:
    app: python-devops-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: python-devops-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60

---
# PodDisruptionBudget to ensure availability during rolling updates
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: python-devops-app-pdb
  namespace: cicd
  labels:
    app: python-devops-app
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: python-devops-app
