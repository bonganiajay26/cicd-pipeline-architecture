name: Validate CI/CD Pipeline Configs

on:
  push:
    branches: [main, master, develop, 'feature/**', 'release/**']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  KUBEVAL_VERSION: "0.16.1"
  CHECKOV_VERSION: "3.2.0"

jobs:
  # ─── Job 1: YAML Lint ─────────────────────────────────────────────────────
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yamllint
        run: pip install yamllint==1.35.1

      - name: Create yamllint config
        run: |
          cat > .yamllint.yml <<'EOF'
          extends: default
          rules:
            line-length:
              max: 150
              level: warning
            truthy:
              allowed-values: ['true', 'false', 'yes', 'no']
              level: warning
            comments:
              min-spaces-from-content: 1
            document-start: disable
            braces:
              max-spaces-inside: 1
          ignore: |
            .github/
            venv/
            node_modules/
          EOF

      - name: Lint all YAML files
        run: |
          echo "Linting YAML files..."
          yamllint -c .yamllint.yml \
            docker-compose.yml \
            k8s/namespace.yaml \
            k8s/deployment.yaml \
            k8s/service.yaml \
            k8s/jenkins-deployment.yaml \
            .github/workflows/validate.yml

      - name: Report yamllint results
        if: always()
        run: echo "YAML lint completed"

  # ─── Job 2: Validate Jenkinsfile ─────────────────────────────────────────
  validate-jenkinsfile:
    name: Validate Jenkinsfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Jenkinsfile exists
        run: |
          if [[ ! -f "Jenkinsfile" ]]; then
            echo "ERROR: Jenkinsfile not found!"
            exit 1
          fi
          echo "Jenkinsfile found: $(wc -l < Jenkinsfile) lines"

      - name: Validate Jenkinsfile structure (declarative syntax check)
        run: |
          echo "Validating Jenkinsfile declarative pipeline structure..."

          # Check for required declarative pipeline keywords
          required_keywords=(
            "^pipeline"
            "agent"
            "stages"
            "stage("
            "steps"
            "post"
            "always"
            "success"
            "failure"
          )

          all_found=true
          for keyword in "${required_keywords[@]}"; do
            if grep -qE "$keyword" Jenkinsfile; then
              echo "  [PASS] Found keyword: $keyword"
            else
              echo "  [FAIL] Missing keyword: $keyword"
              all_found=false
            fi
          done

          if ! $all_found; then
            echo "Jenkinsfile is missing required declarative pipeline keywords"
            exit 1
          fi

          echo "Jenkinsfile structure validation passed"

      - name: Check for required environment variables
        run: |
          echo "Checking for required environment variable declarations..."
          required_env_vars=("DOCKER_REGISTRY" "APP_NAME" "IMAGE_TAG")

          for var in "${required_env_vars[@]}"; do
            if grep -q "$var" Jenkinsfile; then
              echo "  [PASS] Found env var: $var"
            else
              echo "  [FAIL] Missing env var: $var"
              exit 1
            fi
          done

      - name: Check for required pipeline stages
        run: |
          echo "Checking for required pipeline stages..."
          required_stages=(
            "Checkout"
            "Install Dependencies"
            "Unit Tests"
            "Build Docker Image"
            "Push to Registry"
            "Deploy to K8s"
          )

          for stage in "${required_stages[@]}"; do
            if grep -q "$stage" Jenkinsfile; then
              echo "  [PASS] Found stage: $stage"
            else
              echo "  [WARN] Stage not found: $stage"
            fi
          done

  # ─── Job 3: Kubeval - Validate Kubernetes Manifests ──────────────────────
  kubeval:
    name: Kubeval K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          wget -q "https://github.com/instrumenta/kubeval/releases/download/v${KUBEVAL_VERSION}/kubeval-linux-amd64.tar.gz"
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin/
          kubeval --version

      - name: Validate Kubernetes manifests with kubeval
        run: |
          echo "Validating Kubernetes manifests..."
          kubeval \
            --strict \
            --ignore-missing-schemas \
            --kubernetes-version 1.29.0 \
            k8s/namespace.yaml \
            k8s/deployment.yaml \
            k8s/service.yaml \
            k8s/jenkins-deployment.yaml

      - name: Validate deployment image placeholder exists
        run: |
          if grep -q "IMAGE_PLACEHOLDER" k8s/deployment.yaml; then
            echo "[PASS] IMAGE_PLACEHOLDER found in deployment.yaml (will be replaced by Jenkins)"
          else
            echo "[WARN] IMAGE_PLACEHOLDER not found - ensure image is configured correctly"
          fi

  # ─── Job 4: Checkov Security Scan ────────────────────────────────────────
  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Checkov
        run: pip install checkov==${CHECKOV_VERSION}

      - name: Run Checkov on Kubernetes manifests
        run: |
          checkov \
            --directory k8s/ \
            --framework kubernetes \
            --output cli \
            --output junitxml \
            --output-file-path reports/ \
            --soft-fail \
            --compact \
            --skip-check CKV_K8S_8,CKV_K8S_9 \
            || true

      - name: Run Checkov on Docker Compose
        run: |
          checkov \
            --file docker-compose.yml \
            --framework dockerfile \
            --soft-fail \
            || true

      - name: Upload Checkov results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-results
          path: reports/
          retention-days: 30

      - name: Publish Checkov Test Results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'reports/results_junitxml.xml'
          check_name: 'Checkov Security Results'
          fail_on_failure: false

  # ─── Job 5: Summary ──────────────────────────────────────────────────────
  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [yaml-lint, validate-jenkinsfile, kubeval, checkov]
    if: always()
    steps:
      - name: Print validation summary
        run: |
          echo "## CI/CD Pipeline Validation Summary"
          echo "| Job | Status |"
          echo "|-----|--------|"
          echo "| yaml-lint           | ${{ needs.yaml-lint.result }} |"
          echo "| validate-jenkinsfile| ${{ needs.validate-jenkinsfile.result }} |"
          echo "| kubeval             | ${{ needs.kubeval.result }} |"
          echo "| checkov             | ${{ needs.checkov.result }} |"
